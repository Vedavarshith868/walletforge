services:
  - type: web
    name: walletforge-backend
    runtime: node
    region: singapore
    rootDir: backend
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm run migrate && npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: walletforge-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_VERSION
        value: "20"

databases:
  - name: walletforge-db
    region: singapore
    plan: free
